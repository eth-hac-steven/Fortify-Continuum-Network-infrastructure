<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'> 
  <link rel="icon" href="./images/Ico for FC.png" type="image/x-icon">
  <title>Fortify Continuum</title>

  <style>
    body {
           background-image: url('./images/FC-office-img.jpg');
           background-size: cover;
           background-position: center;
           background-repeat: no-repeat;
           font-family: monospace;
           display: flex;
           align-items: center;
           justify-content: center;
           min-height: 100vh;
           margin: 0;
           padding: 2rem;
           box-sizing: border-box;
           color: #f2f6ff;
        }

    .wrapper {
           display: flex;
           align-items: flex-start;
           justify-content: center;
           gap: 2rem;
           width: 100%;
           max-width: 1120px;
           flex-wrap: wrap;
        }

    .greeting {
         margin-top:20rem;
         margin-right: 4rem;
         max-width: 440px;
         color: #ffffff;
         text-shadow: 0 2px 6px rgba(0,0,0,0.7);
    }

    .box {
        flex: 0 1 420px;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        width: min(420px, 100%);
        padding: 4rem;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
        box-sizing: border-box;
    }

    .box img {
        width: 100%;
        max-width: 140px;
        display: block;
        margin: 0 auto 1.25rem;
    }

    .name {
         color: #f2f6ff;
         margin-top: 1rem;
         font-size: 1rem;
         text-align: center;
         text-shadow: 0 1px 3px rgba(0,0,0,0.7);
         }
    input {
    width: 100%;
    padding: .75rem;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 8px;
    color: #ffffff;
    font-family: monospace;
    font-size: 1rem;
    box-sizing: border-box;
    margin: .5rem 0 1rem;
    }

    input:focus {
        outline: 2px solid rgba(20, 121, 213, 0.75);
        outline-offset: 2px;
    }

    .button { width:100%;
             padding:.85rem;
             background:#1479d5;
            color:#ffffff;
             border:none;
             border-radius:6px;
             font-weight:bold;
             font-size:1rem;
             cursor:pointer;
             box-shadow: 0 10px 20px rgba(0,0,0,0.15);
             }
    .button:hover {
        background: #0f69c2;
    }
    .note { font-size:.8rem;
            color:#f2f6ff;
            margin-top:1rem;
            text-align: center;
            text-shadow: 0 1px 3px rgba(0,0,0,0.7);
        }
    .conditions {
        color:#88c0ff;
        text-decoration:underline;
        text-decoration-color:#88c0ff;
        cursor:pointer;
        }
    .company.name {
        color:#1479d5;
        font-size: clamp(2rem, 4vw, 3rem);
        font-weight: bold;
        font-family: 'Ubuntu', sans-serif;
        text-shadow: 0 2px 6px rgba(0,0,0,0.65);
    }
    .statusTitle {
      font-size: clamp(1.5rem, 3vw, 2rem);
      color: #2d6a4f;
      margin-bottom: 10px;
      text-align:center;
    }

    .statusTitle2 {
      font-size: clamp(1.5rem, 3vw, 2rem);
      color: #cf2418;
      margin-bottom: 10px;
      text-align:center;
    }

    .username {
      font-size: 1rem;
      color: #ffffff;
      margin-bottom: 20px;
      text-align: center;
    }


    @media (max-width: 900px) {
        body {
            padding: 1.5rem;
        }

        .wrapper {
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

         .greeting {
            margin-top: 0rem;
            max-width: 100%;
            text-align: center;
            margin-left: 12vw;
        }
    }

    @media (max-width: 480px) {
        body {
            padding: 1rem;
        }

        .box {
            padding: 1.25rem;
        }

        .button {
            padding: 0.9rem;
        }

        .note {
            font-size: .78rem;
        }

         .greeting {
            margin-top: 0rem;
            max-width: 100%;
            text-align: center;
        }
    }

  </style>
</head>
<body>
  <div class="wrapper">
    <div class="greeting">
      <h1>Welcome to <br>
           <span class="company name">Fortify Continuum</span></h1>
      <p>To access the internet, please log in with your credentials.</p>
    </div>
    <div class='box'>
    <img src=./images/logo%20for%20FC.png>
    <h2 class='name'>Staff Access</h2>
    <form method='POST' action='http://10.10.60.1:8012/index.php?zone=staff_zone'>
      <input type='hidden' name='redirurl' value='https://www.google.com/'>
      <input name="zone" type="hidden" value="staff_zone">
      <input name="auth_user" type="text" placeholder="Username" >
      <input name="auth_pass" type="password" placeholder="Password"
             autocomplete='off' spellcheck='false' required>
      <input type='hidden' name='auth_pass' id='auth_pass'>
       <input type="submit" name="accept" class="button" value="Connect" id="login" >
       <p class='note'>By connecting you are agreeing to our <br> <span class="conditions"> Terms and condition</span></p>
    </form>

    </div>
  </div>
</body>
</html>
